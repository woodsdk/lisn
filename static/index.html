<!DOCTYPE html>
<html lang="da">
<head>

  <meta name="theme-color" content="#020E0D">

    <linearGradient id="ig" gradientUnits="userSpaceOnUse" x1="2" y1="2" x2="22" y2="22">

      <stop offset="45%" stop-color="#2AB09E"/>
      <stop offset="100%" stop-color="#5EEAD4"/>

</svg>
